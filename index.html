<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL ANEES | AI Meeting Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-collapsed: 72px; --sidebar-expanded: 260px;
            --bg-main: #f8fafc; --surface: #ffffff; --accent: #2563eb;
            --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg-main: #0f172a; --surface: #1e293b; --text-main: #f1f5f9;
            --text-muted: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); height: 100vh; overflow: hidden; }

        #sidebar { 
            width: var(--sidebar-collapsed); height: 100vh; background: var(--surface); border-right: 1px solid var(--border); 
            transition: width 0.3s; display: flex; flex-direction: column;
        }
        #sidebar.expanded { width: var(--sidebar-expanded); }
        .sidebar-header { height: 70px; display: flex; align-items: center; padding: 0 24px; cursor: pointer; }
        .brand-text { margin-left: 20px; opacity: 0; transition: 0.2s; white-space: nowrap; }
        #sidebar.expanded .brand-text { opacity: 1; }
        
        .nav-item { display: flex; align-items: center; height: 48px; padding: 0 24px; color: var(--text-muted); cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: #eff6ff; color: var(--accent); }
        .nav-label { margin-left: 20px; opacity: 0; }
        #sidebar.expanded .nav-label { opacity: 1; }

        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar { height: 70px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 40px; }
        .content-area { max-width: 800px; margin: 40px auto; width: 90%; }
        
        .minutes-box { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; 
            line-height: 1.8; outline: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .label { font-weight: 700; color: var(--accent); margin-right: 8px; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #1e293b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .hidden { display: none !important; }

        .wave-box { display: flex; align-items: center; justify-content: center; gap: 4px; height: 40px; margin: 15px 0; }
        .wave-bar { width: 3px; height: 8px; background: var(--accent); border-radius: 3px; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 35px; } }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header" onclick="this.parentElement.classList.toggle('expanded')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <div class="brand-text"><span style="font-weight:700;">AL ANEES AI</span></div>
        </div>
        <div class="nav-item active" onclick="location.reload()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span class="nav-label">New Session</span></div>
    </nav>

    <main>
        <div class="top-bar"><strong>AL ANEES | Meeting Intelligence Engine</strong></div>

        <div class="content-area">
            <div id="idleState" class="minutes-box">
                <h1>AI-Powered Minutes</h1>
                <p>This system uses intelligent filtering to detect Action Items and correct professional terminology like "Mail" and "Invoicing".</p>
                <button class="btn btn-primary" onclick="startSession()">▶ Activate AI Listener</button>
            </div>

            <div id="recordingState" class="minutes-box hidden">
                <div style="display:flex; align-items:center; gap:8px;">
                    <div style="width:10px; height:10px; background:red; border-radius:50%; animation: pulse 1s infinite;"></div>
                    <span style="color:red; font-weight:700;">AI CAPTURE ENGINE RUNNING</span>
                </div>
                <div class="wave-box"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>
                <div id="liveText" style="min-height:50px; font-style:italic; color:var(--text-muted); font-size: 1.1em;">...</div>
                <button class="btn btn-danger" onclick="stopSession()" style="margin-top:20px;">Stop & Generate Report</button>
            </div>

            <div id="resultState" class="hidden">
                <div class="minutes-box" id="minutesFinal" contenteditable="true">
                    <div><span class="label">Date:</span> <span id="resDate"></span></div>
                    <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                    <div><span class="label">📝 AI Summary</span><br><span id="resTranscript"></span></div>
                    <br>
                    <div><span class="label">✅ Extracted Action Items</span><br><div id="resActions"></div></div>
                </div>
                <button class="btn btn-primary" style="background:#10b981; width:100%; margin-top:20px;" onclick="saveDoc()">💾 Export AI Report</button>
            </div>
        </div>
    </main>

    <script>
        let rec; 
        let finalizedText = ""; 
        let actionItems = [];
        let processedResults = new Set(); // Prevents repeating text "mess"

        // AI Terminology Correction
        const aiCorrectionMap = { 
            "male": "mail", 
            "tomorrow": "Tomorrow", 
            "sajid": "Sajid",
            "invoice": "Invoice",
            "meeting": "Meeting"
        };

        const actionTriggers = ["tomorrow", "will", "must", "send", "come", "bring", "task", "finish"];

        function startSession() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("Browser not supported.");
            
            rec = new Speech(); 
            rec.continuous = true; 
            rec.interimResults = true;
            rec.lang = 'en-US';

            document.getElementById('resDate').innerText = new Date().toLocaleString();

            rec.onresult = (e) => {
                let currentInterim = "";
                
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    let transcript = e.results[i][0].transcript.trim();
                    
                    // 1. AI Homophone Correction
                    Object.keys(aiCorrectionMap).forEach(key => {
                        let reg = new RegExp(`\\b${key}\\b`, "gi");
                        transcript = transcript.replace(reg, aiCorrectionMap[key]);
                    });

                    if (e.results[i].isFinal) {
                        // 2. Repetition Lock: Only process if we haven't handled this index
                        if (!processedResults.has(i)) {
                            finalizedText += transcript.charAt(0).toUpperCase() + transcript.slice(1) + ". ";
                            
                            // 3. Action Item Extraction
                            if (actionTriggers.some(k => transcript.toLowerCase().includes(k))) {
                                actionItems.push(transcript);
                            }
                            processedResults.add(i);
                        }
                    } else {
                        currentInterim = transcript;
                    }
                }
                // Only show the moving text, not the messy stack
                document.getElementById('liveText').innerText = currentInterim || "Processing speech...";
            };

            rec.onend = () => { 
                if (!document.getElementById('recordingState').classList.contains('hidden')) rec.start(); 
            };
            
            rec.start();
            document.getElementById('idleState').classList.add('hidden');
            document.getElementById('recordingState').classList.remove('hidden');
        }

        function stopSession() {
            rec.onend = null;
            rec.stop();
            document.getElementById('recordingState').classList.add('hidden');
            document.getElementById('resultState').classList.remove('hidden');
            
            document.getElementById('resTranscript').innerText = finalizedText || "No discussion recorded.";
            document.getElementById('resActions').innerHTML = actionItems.length > 0 ? 
                actionItems.map(a => `• ${a}`).join('<br>') : "• No actions identified.";
        }

        function saveDoc() {
            const content = document.getElementById('minutesFinal').innerText;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            a.download = `AI_Meeting_Report_${Date.now()}.txt`;
            a.href = URL.createObjectURL(blob);
            a.click();
        }
    </script>
</body>
</html>
