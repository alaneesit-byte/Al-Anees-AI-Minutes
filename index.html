<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL ANEES | Meeting Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-collapsed: 72px;
            --sidebar-expanded: 260px;
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --accent: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: var(--sidebar-collapsed); height: 100vh; background: var(--surface); border-right: 1px solid var(--border); 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 1000; display: flex; flex-direction: column;
        }
        #sidebar.expanded { width: var(--sidebar-expanded); box-shadow: var(--shadow-lg); }
        
        .sidebar-header { height: 70px; display: flex; align-items: center; padding: 0 24px; flex-shrink: 0; }
        .menu-btn { cursor: pointer; color: var(--text-muted); transition: 0.2s; display: flex; align-items: center; }
        .brand-logo { margin-left: 15px; opacity: 0; transition: 0.2s; white-space: nowrap; font-weight: 700; font-size: 14px; letter-spacing: -0.5px; pointer-events: none; }
        #sidebar.expanded .brand-logo { opacity: 1; }

        .nav-section { padding: 12px; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; height: 48px; border-radius: 12px; margin-bottom: 4px; color: var(--text-muted); transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: #f1f5f9; color: var(--text-main); }
        .nav-item.active { background: #eff6ff; color: var(--accent); }
        .nav-icon { min-width: 48px; display: flex; justify-content: center; }
        .nav-label { font-size: 14px; font-weight: 500; opacity: 0; transition: 0.2s; white-space: nowrap; }
        #sidebar.expanded .nav-label { opacity: 1; }

        /* --- MAIN VIEWPORT --- */
        main { flex: 1; display: flex; flex-direction: column; position: relative; overflow-y: auto; }
        .top-bar { height: 70px; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 40px; position: sticky; top: 0; z-index: 10; justify-content: space-between; }
        
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .brand-text-watermark { font-weight: 800; color: var(--text-main); letter-spacing: 1px; }

        .workspace-container { max-width: 850px; margin: 40px auto; width: 90%; padding-bottom: 100px; }
        .glass-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); transition: 0.3s; }

        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; background: #f1f5f9; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; }
        .status-badge.live { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .status-badge.paused { background: #fef9c3; color: #a16207; border: 1px solid #fef08a; }

        .btn-primary { background: var(--text-main); color: white; border: none; padding: 12px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); border: none; padding: 12px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; margin-right: 10px; }
        
        .viz-container { display: flex; gap: 4px; height: 30px; align-items: flex-end; margin-bottom: 25px; }
        .viz-bar { width: 4px; background: var(--accent); border-radius: 10px; animation: bar-grow 0.8s infinite ease-in-out alternate; }
        .viz-bar.paused { animation-play-state: paused; background: #94a3b8; }
        @keyframes bar-grow { from { height: 6px; opacity: 0.3; } to { height: 30px; opacity: 1; } }

        .output-container { display: none; margin-top: 40px; }
        .output-container.visible { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .rich-content { font-size: 15px; line-height: 1.7; color: #334155; min-height: 250px; white-space: pre-wrap; }
        .action-bar { display: flex; gap: 10px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
        .icon-btn { width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--border); background: white; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: #f8fafc; color: var(--accent); border-color: var(--accent); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="menu-btn" onclick="toggleSidebar()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            <div class="brand-logo">AL ANEES</div>
        </div>
        <div class="nav-section">
            <div class="nav-item active" onclick="location.reload()"><div class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></div><div class="nav-label">New Session</div></div>
        </div>
    </nav>

    <main>
        <div class="top-bar">
            <div class="logo-group">
                <div class="brand-text-watermark">AL ANEES</div>
            </div>
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 700;">DASHBOARD / MEETING_HUB</div>
        </div>

        <div class="workspace-container">
            <div class="glass-card" id="mainCard">
                <div id="idleState">
                    <div class="status-badge">Professional Meeting Hub</div>
                    <h1 style="margin: 0 0 10px 0; font-size: 26px; font-weight: 700;">Al Anees Transcription</h1>
                    <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 15px;">Real-time text capture for your professional meetings.</p>
                    <button class="btn-primary" onclick="startMeeting()">▶ Start Session</button>
                </div>

                <div id="recordingState" class="hidden">
                    <div id="recordingBadge" class="status-badge live">● Recording Active</div>
                    <div id="langStatus" style="font-size:12px; color:var(--accent); font-weight:600; margin-bottom:15px; height: 40px; overflow-y: auto;">Capturing Audio...</div>
                    <div class="viz-container">
                        <div class="viz-bar" style="animation-delay: 0s"></div><div class="viz-bar" style="animation-delay: 0.2s"></div><div class="viz-bar" style="animation-delay: 0.4s"></div>
                        <div class="viz-bar" style="animation-delay: 0.1s"></div><div class="viz-bar" style="animation-delay: 0.3s"></div><div class="viz-bar" style="animation-delay: 0.5s"></div>
                    </div>
                    <button id="pauseBtn" class="btn-secondary" onclick="togglePause()">Pause Session</button>
                    <button class="btn-primary" style="background:#dc2626" onclick="finalizeMeeting()">Finalize & View Transcript</button>
                </div>
            </div>

            <div class="output-container" id="summaryBox">
                <h3 style="font-size: 14px; color: var(--text-muted); margin-bottom: 15px;">Meeting Transcript</h3>
                <div class="glass-card">
                    <div class="rich-content" id="summaryContent" contenteditable="true"></div>
                    <div class="action-bar">
                        <button class="icon-btn" onclick="downloadTxt()" title="Download"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/></svg></button>
                        <button class="icon-btn" onclick="copyText()" title="Copy"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let recognition;
        let fullTranscript = "";
        let isPaused = false;

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                if (isPaused) return; 
                
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        fullTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                document.getElementById('langStatus').innerText = (interimTranscript || "Listening...");
            };

            recognition.onend = () => {
                if (!isPaused && !document.getElementById('recordingState').classList.contains('hidden')) {
                    recognition.start();
                }
            };

            recognition.onerror = (err) => console.error("Mic Error:", err);
        }

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('expanded');

        window.startMeeting = function() {
            if (!recognition) return alert("Microphone access is not supported on this browser.");
            fullTranscript = "";
            isPaused = false;
            try {
                recognition.start();
                document.getElementById('idleState').classList.add('hidden');
                document.getElementById('recordingState').classList.remove('hidden');
            } catch(e) { alert("Microphone blocked or already in use."); }
        };

        window.togglePause = function() {
            const btn = document.getElementById('pauseBtn');
            const badge = document.getElementById('recordingBadge');
            const bars = document.querySelectorAll('.viz-bar');

            if (!isPaused) {
                isPaused = true;
                recognition.stop();
                btn.innerText = "Resume Session";
                badge.innerText = "|| Session Paused";
                badge.className = "status-badge paused";
                document.getElementById('langStatus').innerText = "Paused...";
                bars.forEach(b => b.classList.add('paused'));
            } else {
                isPaused = false;
                recognition.start();
                btn.innerText = "Pause Session";
                badge.innerText = "● Recording Active";
                badge.className = "status-badge live";
                document.getElementById('langStatus').innerText = "Resuming...";
                bars.forEach(b => b.classList.remove('paused'));
            }
        };

        window.finalizeMeeting = function() {
            isPaused = true;
            if(recognition) recognition.stop();
            
            document.getElementById('recordingState').classList.add('hidden');
            document.getElementById('summaryBox').classList.add('visible');
            document.getElementById('summaryContent').innerText = fullTranscript || "No text was captured. Make sure your microphone is working.";
        };

        window.copyText = () => {
            navigator.clipboard.writeText(document.getElementById('summaryContent').innerText);
            alert("Transcript Copied.");
        };

        window.downloadTxt = () => {
            const blob = new Blob([document.getElementById('summaryContent').innerText], {type: 'text/plain'});
            const a = document.createElement('a');
            a.download = 'Al_Anees_Transcript.txt';
            a.href = URL.createObjectURL(blob);
            a.click();
        };
    </script>
</body>
</html>
